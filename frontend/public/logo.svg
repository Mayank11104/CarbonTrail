<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B4332"/>
      <stop offset="100%" stop-color="#40916C"/>
    </linearGradient>
    <linearGradient id="trailGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C07B52"/>
      <stop offset="100%" stop-color="#E8D5B0"/>
    </linearGradient>
  </defs>
  <!-- Warm circular background -->
  <circle cx="256" cy="256" r="248" fill="#F5F3EF" stroke="#E8D5B0" stroke-width="4"/>
  <!-- Trail path (winding footpath in Clay/Sand) -->
  <path d="M140 380 C160 340, 200 350, 220 310 C240 270, 200 250, 230 210 C260 170, 300 190, 310 150 C320 110, 350 120, 370 90" stroke="url(#trailGrad)" stroke-width="18" stroke-linecap="round" fill="none" opacity="0.9"/>
  <!-- Trail dots -->
  <circle cx="155" cy="365" r="5.5" fill="#C07B52" opacity="0.4"/>
  <circle cx="215" cy="318" r="5.5" fill="#C07B52" opacity="0.5"/>
  <circle cx="222" cy="225" r="5.5" fill="#C07B52" opacity="0.6"/>
  <circle cx="300" cy="165" r="5.5" fill="#C07B52" opacity="0.7"/>
  <circle cx="358" cy="100" r="5.5" fill="#C07B52" opacity="0.85"/>
  <!-- Main leaf (Forest + Sage) -->
  <path d="M300 280 C300 200, 240 140, 180 140 C180 140, 180 200, 220 240 C200 220, 180 220, 160 230" stroke="url(#leafGrad)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M300 280 C300 200, 240 140, 180 140 C220 170, 250 210, 270 260" fill="#1B4332" opacity="0.12"/>
  <!-- Leaf vein -->
  <path d="M190 165 C220 190, 250 220, 285 265" stroke="#1B4332" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.35"/>
  <!-- Small accent leaf in Sage -->
  <path d="M340 200 C340 170, 320 150, 300 150 C310 160, 320 175, 330 195" fill="#40916C" opacity="0.5"/>
  <!-- CO2 down indicator -->
  <g transform="translate(360, 300)">
    <circle cx="0" cy="0" r="36" fill="#1B4332" opacity="0.08"/>
    <text x="0" y="-8" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1B4332">CO₂</text>
    <path d="M-10 12 L0 24 L10 12" stroke="#40916C" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
